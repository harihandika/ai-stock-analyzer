name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: aistock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
        
    - name: Run Tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/aistock_test
        SYNC_DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/aistock_test
        SECRET_KEY: test_secret_key_123
        ANTHROPIC_API_KEY: mock-key-for-testing
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/ -v

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Trigger Render Deployment
      env:
        deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        if [ -z "$deploy_url" ]; then
          echo "Render Deploy Hook URL is not set in GitHub Secrets."
          exit 1
        fi
        curl -X POST "$deploy_url"
